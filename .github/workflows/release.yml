name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            pkg-config

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS
        if: runner.os == 'macOS'
        run: |
          mkdir -p "Proxhy Launcher.app/Contents/MacOS"
          mkdir -p "Proxhy Launcher.app/Contents/Resources"
          cp target/${{ matrix.target }}/release/proxhy-launcher \
             "Proxhy Launcher.app/Contents/MacOS/proxhy-launcher"
          cp assets/icons/Proxhy.icns "Proxhy Launcher.app/Contents/Resources/Proxhy.icns"
          cat > "Proxhy Launcher.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>   <string>proxhy-launcher</string>
            <key>CFBundleIconFile</key>     <string>Proxhy.icns</string>
            <key>CFBundleIdentifier</key>   <string>com.proxhy</string>
            <key>CFBundleName</key>         <string>Proxhy Launcher</string>
            <key>CFBundlePackageType</key>  <string>APPL</string>
            <key>CFBundleShortVersionString</key> <string>${{ github.ref_name }}</string>
            <key>NSHighResolutionCapable</key>    <true/>
            <key>NSPrincipalClass</key>     <string>NSApplication</string>
          </dict>
          </plist>
          EOF
          zip -r "Proxhy Launcher.zip" "Proxhy Launcher.app"
          tar -czf proxhy-launcher-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release proxhy-launcher

      - name: Package Linux
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          mkdir -p AppDir/usr/bin
          cp target/${{ matrix.target }}/release/proxhy-launcher AppDir/usr/bin/

          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/proxhy-launcher" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          cat > AppDir/proxhy-launcher.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Proxhy Launcher
          Exec=proxhy-launcher
          Icon=proxhy-launcher
          Type=Application
          Categories=Network;
          DESKTOP

          cp assets/icons/Proxhy.png AppDir/proxhy-launcher.png

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir Proxhy.AppImage
          tar -czf proxhy-launcher-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release proxhy-launcher

      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cp target\${{ matrix.target }}\release\proxhy-launcher.exe "Proxhy Launcher.exe"
          Compress-Archive `
            -Path target\${{ matrix.target }}\release\proxhy-launcher.exe `
            -DestinationPath proxhy-launcher-${{ matrix.target }}.zip

      - name: Upload macOS
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Proxhy Launcher.zip
            proxhy-launcher-${{ matrix.target }}.tar.gz

      - name: Upload Linux
        if: runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Proxhy.AppImage
            proxhy-launcher-${{ matrix.target }}.tar.gz

      - name: Upload Windows
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Proxhy Launcher.exe
            proxhy-launcher-${{ matrix.target }}.zip
